<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Lustria&display=swap" rel="stylesheet">
    <title>macOS</title>
    <link rel="icon" href="/icons/favicon.ico" />

  </head>

  <body>
    <!-- ✅ Boot splash (shows BEFORE React loads) -->
    <div id="boot-splash" aria-label="Loading" role="status">
      <!-- subtle grain like macOS -->
      <div class="boot-grain" aria-hidden="true"></div>

      <div class="boot-card">
        <!-- macOS “traffic lights” hint -->
        <div class="boot-lights" aria-hidden="true">
          <span class="boot-light red"></span>
          <span class="boot-light yellow"></span>
          <span class="boot-light green"></span>
        </div>

        <div class="boot-row">
          <div class="boot-spinner" aria-hidden="true"></div>

          <div class="boot-text">
            <div class="boot-title">Loading Marta’s Portfolio…</div>

            <!-- rotating status lines (CSS-only) -->
            <div class="boot-subtitle">
              <span class="boot-status s1">Starting Server</span>
              <span class="boot-status s2">Mounting Dock</span>
              <span class="boot-status s3">Rendering Desktop</span>
            </div>
          </div>
        </div>

        <!-- macOS-ish thin progress bar -->
        <div class="boot-progress" aria-hidden="true">
          <div class="boot-progress-fill"></div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <style>
      /* -------------------------
         Splash overlay
      -------------------------- */
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      /* Subtle grain overlay (no external images) */
      .boot-grain {
        pointer-events: none;
        position: absolute;
        inset: 0;
        opacity: 0.06;
        background-image:
          radial-gradient(circle at 20% 30%, rgba(0,0,0,0.35) 0.5px, transparent 0.6px),
          radial-gradient(circle at 70% 60%, rgba(0,0,0,0.25) 0.5px, transparent 0.6px),
          radial-gradient(circle at 40% 80%, rgba(0,0,0,0.20) 0.5px, transparent 0.6px);
        background-size: 6px 6px, 7px 7px, 5px 5px;
        mix-blend-mode: soft-light;
      }

      /* -------------------------
         Card
      -------------------------- */
      .boot-card {
        position: relative;
        width: 380px;
        max-width: 92vw;
        border-radius: 22px;
        padding: 18px 18px 16px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(0, 0, 0, 0.10);
        box-shadow:
          0 30px 90px rgba(0,0,0,0.18),
          0 1px 0 rgba(255,255,255,0.45) inset;
      }

      /* tiny macOS traffic lights */
      .boot-lights {
        display: flex;
        gap: 7px;
        margin-bottom: 12px;
        opacity: 0.9;
      }
      .boot-light {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.10) inset;
      }
      .boot-light.red { background: rgba(255, 90, 90, 0.95); }
      .boot-light.yellow { background: rgba(255, 203, 77, 0.95); }
      .boot-light.green { background: rgba(72, 213, 124, 0.95); }

      .boot-row {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .boot-spinner {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        border: 2px solid rgba(0,0,0,0.16);
        border-top-color: rgba(0,0,0,0.70);
        animation: bootspin 1.6s linear infinite;
      }
      @keyframes bootspin { to { transform: rotate(360deg); } }

      .boot-title {
        font: 600 15px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: rgba(0,0,0,0.82);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* rotating status lines */
      .boot-subtitle {
        position: relative;
        height: 16px;
        margin-top: 5px;
        font: 400 13px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: rgba(0,0,0,0.55);
        overflow: hidden;
      }
      .boot-status {
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        transform: translateY(4px);
        animation: bootstatus 4.2s ease-in-out infinite;
        white-space: nowrap;
      }
      .boot-status.s1 { animation-delay: 0s; }
      .boot-status.s2 { animation-delay: 1.4s; }
      .boot-status.s3 { animation-delay: 2.8s; }

      @keyframes bootstatus {
        0% { opacity: 0; transform: translateY(4px); }
        10% { opacity: 1; transform: translateY(0px); }
        35% { opacity: 1; transform: translateY(0px); }
        45% { opacity: 0; transform: translateY(-4px); }
        100% { opacity: 0; }
      }

      /* macOS login-style progress bar */
      .boot-progress {
        margin-top: 14px;
        height: 6px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(0,0,0,0.10);
      }
      .boot-progress-fill {
        height: 100%;
        width: 38%;
        border-radius: 999px;
        background: rgba(0,0,0,0.30);
        transform: translateX(-70%);
        animation: bootbar 2s ease-in-out infinite;
      }
      @keyframes bootbar {
        0% { transform: translateX(-70%); }
        100% { transform: translateX(220%); }
      }

      /* Fade out nicely when React removes it */
      #boot-splash.boot-hide {
        opacity: 0;
        pointer-events: none;
        transition: opacity 120ms ease;
      }
    </style>
  </body>
</html>
